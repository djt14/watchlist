<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 520" preserveAspectRatio="xMidYMax slice">
  <style>
    .bloom { animation: bloom 6s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .bloom.d1 { animation-delay: -2s; } .bloom.d2 { animation-delay: -4s; } .bloom.d3 { animation-delay: -1s; }
    @keyframes bloom { 0%,100% { opacity: 0.35; } 50% { opacity: 0.95; } }
    @media (prefers-reduced-motion: reduce) { .bloom { animation: none; } }
  </style>
  <defs>
    <radialGradient id="glow-t" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8fe8d8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8fe8d8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-v" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a6ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c9a6ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fog" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b2438" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1b2438" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- distant ridge -->
  <path d="M0 430 L120 360 L230 415 L340 330 L470 410 L590 350 L700 420 L840 340 L960 415 L1080 355 L1200 425 L1330 345 L1450 410 L1600 360 L1600 520 L0 520 Z"
        fill="#151c2e" opacity="0.55"/>

  <!-- tree 1: tall, leaning right, spiral crown -->
  <g fill="none" stroke="#1a2136" stroke-linecap="round">
    <path d="M180 520 C185 440 170 380 190 320 C205 262 195 230 178 200" stroke-width="26"/>
    <path d="M190 330 C230 300 268 292 300 254 C318 232 316 208 306 196 C298 187 284 190 282 202 C280 214 292 220 300 214" stroke-width="12"/>
    <path d="M186 250 C160 224 132 220 116 190 C106 170 112 152 126 148 C138 145 146 156 140 166 C134 175 122 172 122 162" stroke-width="10"/>
    <path d="M178 200 C176 170 186 148 206 132 C222 119 242 122 246 136 C249 148 238 156 230 150" stroke-width="8"/>
    <path d="M195 400 C240 388 272 396 306 376" stroke-width="10"/>
  </g>

  <!-- tree 2: broad, center-right, arching over -->
  <g fill="none" stroke="#1a2136" stroke-linecap="round">
    <path d="M1120 520 C1112 440 1130 396 1118 340 C1108 292 1120 258 1140 236" stroke-width="30"/>
    <path d="M1122 350 C1070 322 1030 330 992 300 C966 279 962 252 976 242 C988 233 1002 242 998 254 C994 266 980 264 980 254" stroke-width="12"/>
    <path d="M1136 260 C1180 240 1224 246 1258 220 C1282 202 1284 176 1270 168 C1258 161 1246 170 1250 182 C1254 193 1266 191 1266 182" stroke-width="10"/>
    <path d="M1140 236 C1146 204 1136 180 1148 156 C1158 136 1178 132 1186 144 C1193 154 1184 164 1175 159" stroke-width="8"/>
    <path d="M1118 430 C1064 420 1030 428 992 414" stroke-width="10"/>
  </g>

  <!-- tree 3: small, far left-center -->
  <g fill="none" stroke="#182031" stroke-linecap="round" opacity="0.8">
    <path d="M640 520 C644 470 634 440 644 404 C652 374 646 356 636 342" stroke-width="18"/>
    <path d="M644 410 C674 392 700 394 720 372 C733 357 731 340 720 336 C711 333 704 341 708 349" stroke-width="8"/>
    <path d="M638 360 C618 342 598 342 586 322 C578 308 583 294 594 293 C603 292 607 301 601 307" stroke-width="7"/>
  </g>

  <!-- spirit blossoms -->
  <circle class="bloom"    cx="300" cy="212" r="16" fill="url(#glow-t)"/>
  <circle class="bloom d1" cx="128" cy="160" r="13" fill="url(#glow-v)"/>
  <circle class="bloom d2" cx="238" cy="146" r="12" fill="url(#glow-t)"/>
  <circle class="bloom d3" cx="988"  cy="252" r="15" fill="url(#glow-v)"/>
  <circle class="bloom d2" cx="1262" cy="178" r="14" fill="url(#glow-t)"/>
  <circle class="bloom d1" cx="1180" cy="150" r="12" fill="url(#glow-v)"/>
  <circle class="bloom d3" cx="714"  cy="342" r="11" fill="url(#glow-t)"/>
  <circle class="bloom"    cx="596"  cy="298" r="10" fill="url(#glow-v)"/>

  <!-- ground fog -->
  <rect x="0" y="380" width="1600" height="140" fill="url(#fog)"/>
</svg>
